version: '3.8'

services:
  # Our Weather & Flight Database Warehouse
  postgres_warehouse:
    image: postgres:15
    container_name: postgres_warehouse
    environment:
      POSTGRES_USER: data_engineer
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: weather_data
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Our New Weather Worker Service
  weather_worker:
    build: .
    container_name: weather_worker
    depends_on:
      - postgres_warehouse
    environment:
      - DB_HOST=postgres_warehouse
    restart: always

  # Automated Setup Worker (Runs once to build the filing cabinet, then exits)
  airflow_init:
    image: apache/airflow:2.7.1-python3.10
    container_name: airflow_init
    environment:
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__CORE__EXECUTOR=SequentialExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://data_engineer:password123@postgres_warehouse:5432/weather_data
      - _PIP_ADDITIONAL_REQUIREMENTS=psycopg2-binary
    volumes:
      - ./dags:/opt/airflow/dags
    command: bash -c "airflow db migrate && airflow users create --username admin --firstname Talha --lastname Engineer --role Admin --email admin@example.com --password password123"
    depends_on:
      - postgres_warehouse

  # Apache Airflow Scheduler (The Clock/Manager)
  airflow_scheduler:
    image: apache/airflow:2.7.1-python3.10
    container_name: airflow_scheduler
    command: scheduler
    environment:
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__CORE__EXECUTOR=SequentialExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://data_engineer:password123@postgres_warehouse:5432/weather_data
      - _PIP_ADDITIONAL_REQUIREMENTS=psycopg2-binary
    volumes:
      - ./dags:/opt/airflow/dags
    depends_on:
      airflow_init:
        condition: service_completed_successfully

  # Apache Airflow Webserver (The Visual Dashboard)
  airflow_webserver:
    image: apache/airflow:2.7.1-python3.10
    container_name: airflow_webserver
    command: webserver
    ports:
      - "8080:8080"
    environment:
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__CORE__EXECUTOR=SequentialExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://data_engineer:password123@postgres_warehouse:5432/weather_data
      - _PIP_ADDITIONAL_REQUIREMENTS=psycopg2-binary
    volumes:
      - ./dags:/opt/airflow/dags
    depends_on:
      airflow_init:
        condition: service_completed_successfully

volumes:
  postgres_data: